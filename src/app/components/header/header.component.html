<header class="header" role="banner">
  <nav class="header__nav" role="navigation" aria-label="Menú principal">
    <div class="header__wrapper">
      <a href="/" class="header__logo-link" aria-label="Inicio - Atlantis Technology">
        <img class="header__logo-img" src="https://www.atlantistech.com/images/logo_atlantis.svg" alt="Logo de Atlantis Technology">
        <span class="header__logo-text">Atlantis Technology</span>
      </a>

      <menu class="header__menu" role="list">
        @for (item of menuItems; track item; let i = $index) {
          <li class="header__menu-item" role="listitem">
            <a class="header__menu-link" [href]="item.link" [tabindex]="i" aria-current="page">
              {{ item.label }}
            </a>
          </li>
        }
      </menu>

      <a href="#" class="header__contact-button--light" role="button" aria-label="Contactar con Atlantis Technology">CONTACT</a>
    </div>
  </nav>
  <div class="header__content">
    <h1 class="header__title">
      Resilient software engineers, embedded with your team.
    </h1>
    <a href="#" class="header__learn-button--dark" role="button" aria-label="Aprende más sobre nuestros servicios">LEARN MORE</a>
  </div>
  <div class="header__background" aria-hidden="true">
    <img src="https://www.atlantistech.com/images/hero_home_mobile.svg" alt="Imagen decorativa de fondo">
  </div>
</header>
